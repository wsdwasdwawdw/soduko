<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="">


    <div class="mainMenu">
        <div class="settings">⚙️</div>
        <h1 class="accent-text">SUDOKU <span>NA PAGOD</span></h1>
        <h2>SYSTEM READY, SELECT DIFFICULTY</h2>

        <div>
            <button class="easy highlight">Easy</button>
            <button class="medium">Medium</button>
            <button class="hard">Hard</button>
        </div>

        <button class="generate">INITIALIZE SEQUENCE</button>
    </div>


    <section class="gameGround hide">
        <div class="nav">
            <div class="menu">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="timer">00:00</div>
            <div class="settings">⚙️</div>
            <div class="settingsModal hide">

            </div>
        </div>

        <div class="lives">♥ ♥ ♥</div>
        <div class="board"></div>

        <div class="numbers">
            <div class="num-1">1</div>
            <div class="num-2">2</div>
            <div class="num-3">3</div>
            <div class="num-4">4</div>
            <div class="num-5">5</div>
            <div class="num-6">6</div>
            <div class="num-7">7</div>
            <div class="num-8">8</div>
            <div class="num-9">9</div>
        </div>
    </section>

    <section class="modals hide">
        <div class="menuPause hide">
            <h1>Paused</h1>
            <button class="newGame">New Game</button>
            <button class="exit">Exit</button>
            <button class="resume">Resume</button>
        </div>

        <div class="menuShit hide">
            <h1></h1>
            <button class="newGame">New Game</button>
            <button class="exit">Exit</button>
        </div>
    </section>

    <div class="theme-switcher">
        <h1>Theme</h1>
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
            <option value="default">Default</option>
            <option value="sunset">Sunset</option>
            <option value="forest">Forest</option>
            <option value="plain">Plain</option>
        </select>
        <div>
            <div class="sunset">
                <p>Sunset</p>
                <div class="theme-preview-sunset"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
